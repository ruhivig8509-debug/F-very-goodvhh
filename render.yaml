services:
  - type: worker          # Background worker — no HTTP port needed for Telegram bot
    name: ruhi-ji-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free             # Free tier on Render
    autoDeploy: true

    envVars:
      - key: BOT_TOKEN
        sync: false        # You fill this in Render dashboard
      - key: OWNER_ID
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
